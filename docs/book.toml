[book]
title = "AI Agent Assembly Documentation"
description = "Documentation for AI Agent Assembly: governance-native runtime for AI agents."
authors = ["AI Agent Assembly Team"]
language = "en"
src = "src"

# i18n / localization (AAASM-4637 scaffold → AAASM-4697 zh-Hant first pass).
# Localization uses the mdbook-i18n-helpers gettext workflow, NOT mdBook's native
# `[language]` table (which the pinned mdBook build rejects when empty). The
# `gettext` preprocessor below is a no-op passthrough for the default English
# build (`language = "en"`, no `po/en.po`); a translated build is produced by
# overriding the language, e.g.:
#
#   MDBOOK_BOOK__LANGUAGE=zh-Hant mdbook build -d book/zh-Hant
#
# which loads `po/zh-Hant.po` and falls back to the English source for any
# untranslated string. The aggregation pipeline (docs/scripts/aggregate.sh)
# builds English at the site root and zh-Hant under /zh-Hant/; the theme's
# language switcher (theme/head.hbs) links between them. To re-extract the
# translation template after editing the English source:
#
#   MDBOOK_OUTPUT__xgettext__pot_file=messages.pot mdbook build -d po
#   msgmerge --update po/zh-Hant.po po/messages.pot
#
# See src/localization.md for the full contributor workflow.

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/ai-agent-assembly/docs"
edit-url-template = "https://github.com/ai-agent-assembly/docs/edit/main/docs/{path}"
additional-css = ["theme/aaasm-brand.css"]
additional-js = ["mermaid.min.js", "mermaid-init.js", "theme/light-dark-toggle.js", "theme/aa-funnel-events.js"]

[preprocessor]

# Translate the source with gettext BEFORE the other preprocessors run, using
# the PO catalog selected by book.language (overridable via MDBOOK_BOOK__LANGUAGE).
# No-op for English; see the i18n note above. `after = ["links"]` so include
# directives are resolved into translatable text first.
[preprocessor.gettext]
after = ["links"]

[preprocessor.mermaid]
command = "mdbook-mermaid"

[preprocessor.last-changed]
command = "python3 theme/last-changed.py"
