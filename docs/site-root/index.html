<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Fallback redirect to latest if JS is unavailable or versions.json is missing. -->
    <meta http-equiv="refresh" content="1; url=latest/" />
    <link rel="canonical" href="latest/" />
    <title>AI Agent Assembly Documentation</title>
  </head>
  <body>
    <p>Redirecting to the AI Agent Assembly documentation&hellip;</p>
    <p>If you are not redirected, <a id="fallback" href="latest/">open the latest documentation</a>.</p>
    <!-- Resolve the landing channel from versions.json: stable -> pre-release -> latest. -->
    <script>
      (function () {
        function go(path) {
          var link = document.getElementById("fallback");
          if (link) { link.setAttribute("href", path); }
          window.location.replace(path);
        }
        fetch("versions.json", { cache: "no-cache" })
          .then(function (resp) { return resp.ok ? resp.json() : null; })
          .then(function (data) {
            if (!data || !Array.isArray(data.versions) || data.versions.length === 0) {
              go("latest/");
              return;
            }
            var byChannel = function (ch) {
              return data.versions.filter(function (v) { return v.channel === ch; })[0];
            };
            var target = byChannel("stable") || byChannel("pre-release") || byChannel("latest");
            go(target ? target.path : "latest/");
          })
          .catch(function () { go("latest/"); });
      })();
    </script>
  </body>
</html>
